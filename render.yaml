services:
  - type: static
    name: pit-frontend
    rootDir: Frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://programa-institucional-de-tutorias-pit.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html